<div
  style="display: flex; -webkit-app-region: drag; position: fixed; left: 0px; top: 0px; width: 100%;z-index: 1000000;"
  [draggable]="true">
  <div style="width: 100%;">
    <div style=" display: inline-block; width: calc(100%); height: 30px; position: relative;">
      <img src="assets/icons/yiwei.png" height="100%" style="vertical-align: top; -webkit-app-region: no-drag;">
      <span style="margin-left: 10px; line-height: 30px;"> 马一文 mayiwen 0.3.60</span>
      <span
        style="display: inline-block;  -webkit-app-region: no-drag; position: absolute; right: 0; top:0; font-size: 0;"
        class="closeBox">
        <!-- <myw-button style="vertical-align: top;" (click)="windowEdit('f12')" title="开发者工具"> <myw-icon
            class="marginRight10px" icon="icon-codelibrary" [h]="25"></myw-icon></myw-button> -->
        <myw-button style="vertical-align: top;" (click)="changeTheme()" title="黑白主题切换"> <myw-icon
            class="marginRight10px" icon="icon-skin" [h]="25"></myw-icon></myw-button>
        <myw-button style="vertical-align: top;" (click)="windowEdit('min')" title="最小化"> <myw-icon
            class="marginRight10px" icon="icon-minus-square" [h]="25"></myw-icon></myw-button>
        <myw-button style="vertical-align: top;" (click)="windowEdit('max')" title="最大化"> <myw-icon
            class="marginRight10px" icon="icon-border" [h]="25"></myw-icon></myw-button>
        <myw-button style="vertical-align: top;" (click)="windowEdit('close')" title="关闭"><myw-icon
            class="marginRight10px" icon="icon-close" [h]="25"></myw-icon></myw-button>
      </span>
    </div>
  </div>
</div>
<div ></div>
