<div style="width: 100%; height: 100%" *ngIf="this.file.path" >
  <div style="height: 30px; width: 100%">
    <span (click)="saveAll()">
      <svg class="icon" aria-hidden="true" style="font-size: 24px">
        <use xlink:href="#icon-save"></use>
      </svg>
    </span>
    {{file.path}}
    <myw-button (click)="resetFile()">关闭</myw-button>
    <div style="float: right; margin-right: 10px;">思维导图</div>
  </div>
  <div
    style="
      display: inline-block;
      width: 100%;
      height: calc(100% - 30px);
      max-height: calc(100% - 30px);
      overflow: auto;
      vertical-align: top;
    "
  >
  <div style="height: calc(100% - 150px); overflow: scroll;" >
      <!-- indexId 每个条目的唯一标识 -->
    <app-mind-map-tree-map [(ngModel)]="treeData" indexId="" style="overflow: auto; height: calc(100% - 150px);"></app-mind-map-tree-map>
    </div>
      <div style="height: 150px"   [hidden]="!selectTreeI.uuid">
        <div>
          <p style="font-size: 10px; margin-bottom: -24px;">当前定标 {{ this.selectTreeI.treeId + ' // ' + this.selectTreeI.uuid + '' + this.selectTreeI.v }}</p>
          <app-wangeditor
            #wangeditorRef
            style="width: calc(100% - 80px); vertical-align: top"
            (changeHtml)="changeHtml($event)"
          ></app-wangeditor>
        </div>
     </div>
    </div>
  </div>
<div style="width: 100%; height: 100%"  (dragover)="$event.preventDefault()" (drop)="dropFile($event)" *ngIf="!this.file.path && flagEditor" >
  <app-mind-map-download-template></app-mind-map-download-template>
</div>
