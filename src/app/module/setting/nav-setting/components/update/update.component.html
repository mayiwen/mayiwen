先通过登录鉴权后再操作：
<myw-gap></myw-gap>
<myw-tabs >
  <myw-tabset v="发版">
    <ng-template mywTabSet="">
      <myw-gap></myw-gap>
      <p>选择文件</p>
      <input type="file" name="file" multiple [(ngModel)]="file" (change)="uploadFileChange($event)">
      <p>选择上传到的服务器的路径</p>
      <myw-input [(ngModel)]="filePath" w="300"></myw-input>
      <myw-gap></myw-gap>
      <myw-button (click)="upload()">提交</myw-button>
    </ng-template>
</myw-tabset>
  <myw-tabset v="服务端文件管理">
      <ng-template mywTabSet>
        <myw-gap></myw-gap>
        每次都要登录服务器很麻烦。用后端写个简单的操作服务器文件的。发版，只要把新打的包传上去就好了。
        <myw-gap></myw-gap>
        输入要访问服务器路径：<myw-input w="300" [(ngModel)]="parentPath"></myw-input>
        <myw-button (click)="getFileList()">索取文件与文件夹</myw-button>
        <myw-gap></myw-gap>
        <myw-button (click)="top()">上级路径</myw-button> <myw-button (click)="getFileList()">刷新</myw-button>
        <myw-table [tableCol]="tableCol" [tableData]="tableData">
          <ng-template mywTable select="edit" let-item>
            <myw-button t="red" (click)="deletePath(item)" *ngIf="item.type === 'file'" >删除</myw-button>
            <myw-button (click)="enter(item)" *ngIf="item.type === 'dir'" >进入</myw-button>
          </ng-template>
        </myw-table>
      </ng-template>
  </myw-tabset>

</myw-tabs>
