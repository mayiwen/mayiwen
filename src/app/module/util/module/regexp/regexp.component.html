
<div style="width: 100%; height: 100%;">
  <div>
    <h1 style="text-align: center;">正则表达式校验</h1>
  </div>
  请输入正则
  <div>
    <myw-textarea [(ngModel)]="reg" (ngModelChange)="change()" p="请输入正则表达式，如： /b/i" w="300"></myw-textarea>
  </div>
  <h2> 请输入要校验的内容：</h2>
  <myw-textarea [(ngModel)]="v" (ngModelChange)="change()" w="300"></myw-textarea>
  <div style="height: 10px"></div>
  <div style="color: rgb(197, 3, 3);">{{error}}</div>
  <myw-button w="200" (click)="check()">自动校验中...</myw-button>
  <myw-button w="100" (click)="reset()">重置</myw-button>
  <div>
    校验结果：{{res}}
  </div>
</div>
